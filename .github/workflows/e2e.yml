# E2E テスト — Phase 1 は雛形のみ。Supabase 連携は Phase 2 で整備。
# ローカル実行: cd e2e && npm test

name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Phase 1: CI は整備中。手動 trigger 専用にするか、skip 判定を追加して
    # 本番化するまでの間は fail しないよう continue-on-error を設定。
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Install app dependencies
        working-directory: que-app
        run: npm ci

      # Phase 2: supabase start をここで実行（Docker-in-Docker 設定が必要）
      # - name: Start Supabase
      #   run: npx supabase start

      - name: Start Expo web server (background)
        working-directory: que-app
        env:
          EXPO_PUBLIC_DEV_BYPASS_AUTH: 'true'
          # EXPO_PUBLIC_SUPABASE_URL と EXPO_PUBLIC_SUPABASE_ANON_KEY は
          # Phase 2 で GitHub Secrets から注入する
        run: |
          npx expo export -p web --output-dir dist
          npx serve dist --listen 8081 &
          # サーバー起動待ち
          timeout 60 bash -c 'until curl -s http://localhost:8081 > /dev/null; do sleep 2; done'

      - name: Run Playwright tests
        working-directory: e2e
        env:
          CI: 'true'
          QUE_BASE_URL: 'http://localhost:8081'
        run: npm test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

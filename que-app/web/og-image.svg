<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A" />
      <stop offset="100%" style="stop-color:#1C1C1E" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5E5CE6" />
      <stop offset="100%" style="stop-color:#30D158" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid -->
  <line x1="400" y1="0" x2="400" y2="630" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1" />
  <line x1="800" y1="0" x2="800" y2="630" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1" />
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1" />
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1" />

  <!-- Accent line -->
  <rect x="96" y="252" width="120" height="3" rx="1.5" fill="url(#accent)" />

  <!-- Brand name -->
  <text x="96" y="316" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-weight="700" font-size="80" letter-spacing="-3" fill="#FFFFFF">Que</text>

  <!-- Tagline -->
  <text x="96" y="368" font-family="'SF Pro Text', 'Helvetica Neue', sans-serif" font-weight="400" font-size="28" fill="#EBEBF599">資格学習のサブスク — 月額¥980</text>

  <!-- Certification badges -->
  <rect x="96" y="418" width="168" height="48" rx="12" fill="#FFFFFF" fill-opacity="0.08" />
  <text x="180" y="449" font-family="'SF Pro Text', 'Helvetica Neue', sans-serif" font-weight="500" font-size="18" fill="#FFFFFF" text-anchor="middle">ITパスポート</text>

  <rect x="280" y="418" width="192" height="48" rx="12" fill="#FFFFFF" fill-opacity="0.08" />
  <text x="376" y="449" font-family="'SF Pro Text', 'Helvetica Neue', sans-serif" font-weight="500" font-size="18" fill="#FFFFFF" text-anchor="middle">基本情報技術者</text>

  <rect x="488" y="418" width="96" height="48" rx="12" fill="#FFFFFF" fill-opacity="0.08" />
  <text x="536" y="449" font-family="'SF Pro Text', 'Helvetica Neue', sans-serif" font-weight="500" font-size="18" fill="#FFFFFF" text-anchor="middle">SPI</text>

  <rect x="600" y="418" width="120" height="48" rx="12" fill="#FFFFFF" fill-opacity="0.08" />
  <text x="660" y="449" font-family="'SF Pro Text', 'Helvetica Neue', sans-serif" font-weight="500" font-size="18" fill="#FFFFFF" text-anchor="middle">簿記2級</text>
